services:
  ui:
    stdin_open: true
    tty: true
    image: hdbplanters.azurecr.io/ui
    volumes:
      - ../hdb-ui/public:/hdb-ui/public
      - ../hdb-ui/src:/hdb-ui/src
      - ../hdb-ui/package.json:/hdb-ui/package.json
      - ../hdb-ui/package-lock.json:/hdb-ui/package-lock.json
      - ../hdb-ui/.env:/hdb-ui/.env
    ports:
      - 3000:3000
    build:
      context: ../
      dockerfile: build/ReactUI.Dockerfile
    command: npm start
      

  plant-selection:
    image: hdbplanters.azurecr.io/plant-selection
    stdin_open: true
    tty: true
    build:
        context: ../
        dockerfile: build/AIPlantSelection.Dockerfile
    volumes:
      - ../hdb-plant-selection/src:/hdb-plant-selection/src        
      - ../hdb-plant-selection/tests:/hdb-plant-selection/tests
    ports:
      - 8000:8000
    env_file:
      - .env
    restart: on-failure
    depends_on:
      - elasticsearch
    entrypoint: sh -c "sleep 30 && uvicorn src.main:app --host=0.0.0.0 --port=8000 --reload"


  spatial-placement:
    image: hdbplanters.azurecr.io/spatial-placement
    stdin_open: true
    tty: true
    build:
        context: ../
        dockerfile: build/AISpatialPlacement.Dockerfile
    volumes:
      - ../hdb-spatial-placement/src:/hdb-spatial-placement/src        
      - ../hdb-spatial-placement/tests:/hdb-spatial-placement/tests
    ports:
      - 8001:8001
    env_file:
      - .env
    command: uvicorn src.main:app --host=0.0.0.0 --port=8001 --reload

  elasticsearch:
    image: hdbplanters.azurecr.io/docker.elastic.co/elasticsearch/elasticsearch:8.10.1
    tty: true
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTIC_PASSWORD=elasticpw
    volumes:
      - ../hdb-elasticsearch-db/data:/usr/share/elasticsearch/data
      - ../hdb-elasticsearch-db/src:/hdb-elasticsearch-db/src
      - ../hdb-elasticsearch-db/tests:/hdb-elasticsearch-db/tests
    ports:
      - 9200:9200
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 200000
        hard: 200000
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf --insecure http://kibana_system:elasticpw@localhost:9200/_cat/health | grep -ioE 'green|yellow' || echo 'not green/yellow cluster status'"
        ]

  kibana:
    image: hdbplanters.azurecr.io/docker.elastic.co/kibana/kibana:8.10.1
    container_name: kibana
    ports:
      - 5601:5601
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: elasticpw
      ELASTICSEARCH_HOSTS: 5601
